<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatchMe</title>
<link rel="icon" type="image/png" href="img/catchme_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/tree.css">
<link rel="stylesheet" href="css/digest.css">
<link rel="stylesheet" href="css/chat.css">
</head>
<body>

<nav id="sidebar">
  <div class="logo">
    <img src="img/catchme_logo.png" alt="CatchMe" class="logo-img">
  </div>

  <button class="nav-btn active" data-page="home"><svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="6.5"/><path d="M9 5.5V9l2.5 1.5"/></svg><span class="lbl">Home</span><span class="nav-shortcut">1</span></button>
  <button class="nav-btn" data-page="recall"><svg viewBox="0 0 18 18"><rect x="3" y="2" width="12" height="14" rx="2"/><path d="M7 2v14M3 6h4M3 10h4"/></svg><span class="lbl">Recall</span><span class="nav-shortcut">2</span></button>
  <button class="nav-btn" data-page="explorer"><svg viewBox="0 0 18 18"><circle cx="9" cy="3.5" r="2"/><circle cx="4" cy="13" r="2"/><circle cx="14" cy="13" r="2"/><path d="M9 5.5v3M6.5 11.5L9 8.5l2.5 3"/></svg><span class="lbl">Explorer</span><span class="nav-shortcut">3</span></button>
  <button class="nav-btn" data-page="chat"><svg viewBox="0 0 18 18"><path d="M16 12a2 2 0 01-2 2H6l-4 4V4a2 2 0 012-2h10a2 2 0 012 2z"/></svg><span class="lbl">Chat</span><span class="nav-shortcut">4</span></button>
  <button class="nav-btn" data-page="system"><svg viewBox="0 0 18 18"><path d="M2 14h14"/><path d="M4 14V8"/><path d="M7 14V6"/><path d="M10 14V9"/><path d="M13 14V4"/></svg><span class="lbl">System</span><span class="nav-shortcut">5</span></button>

  <div class="spacer"></div>
  <div class="nav-bottom">
    <div class="lang-select-wrap">
      <button class="nav-icon-btn" id="langBtn" onclick="toggleLangMenu()" title="Summary language">
        <svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" stroke="currentColor" fill="none" stroke-width="1.4"/><path d="M2.5 9h13M9 2c-2.2 2-3.5 4.2-3.5 6.5S6.8 13 9 15.5c2.2-2.5 3.5-4.7 3.5-7S11.2 4 9 2" stroke="currentColor" fill="none" stroke-width="1.2"/></svg>
    </button>
      <div class="lang-menu" id="langMenu">
        <button class="lang-opt" data-lang="en" onclick="setLang('en')">English</button>
        <button class="lang-opt" data-lang="zh" onclick="setLang('zh')">中文</button>
      </div>
    </div>
    <button class="nav-icon-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme"><svg viewBox="0 0 18 18" id="themeIcon"><path d="M13.5 10.5a5.5 5.5 0 01-7.8-6.4A6.5 6.5 0 1013.5 10.5z"/></svg></button>
  </div>
</nav>

<main id="content"></main>

<aside id="chatPanel" class="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">Chat</span>
    <button class="chat-panel-close" onclick="toggleChatPanel()">&times;</button>
  </div>
  <div id="chatPanelContent"></div>
</aside>


<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lbImg"></div>

<div class="tl-tooltip" id="tlTooltip"><div class="tt-time" id="ttTime"></div><div class="tt-kind" id="ttKind"></div><div class="tt-detail" id="ttDetail"></div></div>
<div class="tree-tooltip" id="treeTip">
  <div class="tree-tt-header"><div class="tree-tt-dot" id="treeTipDot"></div><span class="tree-tt-kind" id="treeTipKind"></span><span class="tree-tt-title" id="treeTipTitle"></span></div>
  <div class="tree-tt-body"><div class="tree-tt-meta" id="treeTipMeta"></div><div class="tree-tt-summary" id="treeTipSummary"></div><div class="tree-tt-children" id="treeTipChildren"></div></div>
</div>

<div class="tree-detail-sheet" id="treeDetail">
  <div class="td-header"><div class="td-dot" id="tdDot"></div><span class="td-kind-badge" id="tdKind"></span><span class="td-title" id="tdTitle"></span><button class="td-close" onclick="closeTreeDetail()">&times;</button></div>
  <div class="td-body" id="tdBody"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
